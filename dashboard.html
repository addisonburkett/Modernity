<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Modernity</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">

    <script defer src="assets/js/dashboard.js"></script>
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

        <div class="sidebar-header">
            <a href="index.html" class="logo-link">
                <img src="assets/svg/favicon.svg" class="logo-icon">
                <span class="logo-text">Modernity</span>
            </a>

            <div class="tooltip">
                <button id="pinSidebar" class="icon-btn">
                    <img src="assets/svg/pin.svg" class="icon">
                </button>
                <span class="tooltiptext">Pin sidebar</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item active">
                <img src="assets/svg/home.svg" class="icon">
                <span class="label">Home</span>
            </button>

            <div class="nav-group">
                <button class="nav-expand">
                    <img src="assets/svg/chevron.svg" class="icon chevron">
                    <span class="label">Library</span>
                </button>
                <div class="nav-children">
                    <button class="nav-item">
                        <img src="assets/svg/documents.svg" class="icon">
                        <span class="label">Documents</span>
                    </button>
                    <button class="nav-item">
                        <img src="assets/svg/pictures.svg" class="icon">
                        <span class="label">Pictures</span>
                    </button>
                </div>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="tooltip">
                <button id="logoutBtn" class="icon-btn footer-btn">
                    <img src="assets/svg/logout.svg" class="icon">
                </button>
                <span class="tooltiptext">Log Out</span>
            </div>

            <div class="tooltip right-footer-btn">
                <button id="themeToggle" class="icon-btn footer-btn">
                    <img src="assets/svg/moon.svg" class="icon">
                </button>
                <span class="tooltiptext">Toggle Theme</span>
            </div>
        </div>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="topbar">
            <div class="topbar-left">
                <div class="tooltip">
                    <button id="menuBtn" class="icon-btn">
                        <img src="assets/svg/menu.svg" class="icon">
                    </button>
                    <span class="tooltiptext">Menu</span>
                </div>

                <div class="breadcrumbs">
                    Dashboard / Home
                </div>
            </div>

            <div class="topbar-search">
                <input type="text" id="searchInput" placeholder="Search files..." />
            </div>

            <div class="topbar-right">
                <div class="tooltip">
                    <button id="viewToggle" class="icon-btn">
                        <img id="viewIcon" src="assets/svg/grid.svg" class="icon">
                    </button>
                    <span id="viewTooltip" class="tooltiptext">Grid view</span>
                </div>

                <div class="tooltip">
                    <button id="profileBtn" class="icon-btn">
                        <img src="assets/svg/profile.svg" class="icon">
                    </button>
                    <span class="tooltiptext">Profile</span>
                </div>
            </div>
        </div>

        <!-- Upload controls -->
        <div style="padding: 0 40px 10px;">
            <button id="uploadBtn" class="btn-primary">Upload files</button>
            <input type="file" id="fileInput" accept="image/*,application/pdf,video/*" multiple hidden>
        </div>

        <!-- File area -->
        <div id="fileArea" class="file-area grid-view"></div>

    </main>

</div>

<!-- FIREBASE AUTH + STORAGE + GALLERY -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } 
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { 
        getStorage, ref, uploadBytesResumable, getDownloadURL, listAll 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqsdbfhl-svsh2eZBxoZeA3SvPEjg8rZE",
        authDomain: "modernity-8752c.firebaseapp.com",
        projectId: "modernity-8752c",
        storageBucket: "modernity-8752c.firebasestorage.app",
        messagingSenderId: "1073090189021",
        appId: "1:1073090189021:web:11a323f8ecf9b058882d34"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const storage = getStorage(app);

    const logoutBtn = document.getElementById("logoutBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");
    const fileArea = document.getElementById("fileArea");
    const searchInput = document.getElementById("searchInput");

    let currentFiles = []; // for simple search/filter

    onAuthStateChanged(auth, user => {
        if (!user) {
            window.location.href = "login.html";
        } else {
            loadFiles(user);
        }
    });

    if (logoutBtn) {
        logoutBtn.onclick = () => signOut(auth);
    }

    if (uploadBtn && fileInput) {
        uploadBtn.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const user = auth.currentUser;
            if (!user) return;

            const files = Array.from(e.target.files || []);
            for (const file of files) {
                const path = `users/${user.uid}/uploads/${Date.now()}-${file.name}`;
                const storageRef = ref(storage, path);
                const task = uploadBytesResumable(storageRef, file);

                task.on("state_changed", null, console.error, async () => {
                    await loadFiles(user);
                });
            }
        };
    }

    async function loadFiles(user) {
        const folderRef = ref(storage, `users/${user.uid}/uploads/`);
        const result = await listAll(folderRef);

        currentFiles = [];

        fileArea.innerHTML = "";

        for (const item of result.items) {
            const url = await getDownloadURL(item);
            const name = item.name;

            const fileObj = { name, url };
            currentFiles.push(fileObj);

            const card = document.createElement("div");
            card.className = "file-card";

            const isImage = /\.(jpe?g|png|gif|webp|heic|heif)$/i.test(name);

            card.innerHTML = `
                <div class="file-thumb-wrapper">
                    ${isImage ? `<img src="${url}" class="file-thumb">`
                              : `<div class="file-thumb file-thumb-generic">${name.split('.').pop() || ''}</div>`}
                </div>
                <div class="file-meta">
                    <div class="file-name">${name}</div>
                </div>
            `;

            fileArea.appendChild(card);
        }
    }

    if (searchInput) {
        searchInput.addEventListener("input", () => {
            const q = searchInput.value.toLowerCase();
            fileArea.innerHTML = "";
            for (const f of currentFiles) {
                if (!f.name.toLowerCase().includes(q)) continue;

                const card = document.createElement("div");
                card.className = "file-card";

                const isImage = /\.(jpe?g|png|gif|webp|heic|heif)$/i.test(f.name);

                card.innerHTML = `
                    <div class="file-thumb-wrapper">
                        ${isImage ? `<img src="${f.url}" class="file-thumb">`
                                  : `<div class="file-thumb file-thumb-generic">${f.name.split('.').pop() || ''}</div>`}
                    </div>
                    <div class="file-meta">
                        <div class="file-name">${f.name}</div>
                    </div>
                `;
                fileArea.appendChild(card);
            }
        });
    }
</script>

</body>
</html>
