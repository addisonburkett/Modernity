<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Modernity</title>

    <link rel="icon" type="image/svg+xml" href="assets/svg/favicon.svg">
    <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>

<header class="site-header">
    <div class="container header-inner">
        <div class="logo">
            <img src="assets/svg/favicon.svg" alt="Modernity Logo">
            <span>Modernity</span>
        </div>

        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="login.html" class="active">Login</a>
            <a href="about.html">About</a>
        </nav>
    </div>
</header>

<main class="auth-wrapper">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Sign in to continue to Modernity</p>

        <!-- GOOGLE LOGIN BUTTON -->
        <button id="googleLogin" class="btn-primary" style="width:100%; margin-top:20px;">
            Sign in with Google
        </button>

        <p class="auth-footer">
            Don’t have an account?
            <a href="#">Create one</a>
        </p>
    </div>
</main>

<footer>
    Modernity © 2026 — Crafted with intention
</footer>

<!-- FIREBASE + LOGIN LOGIC -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } 
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "YOUR_KEY",
        authDomain: "modernity-8752c.firebaseapp.com",
        projectId: "modernity-8752c",
        storageBucket: "modernity-8752c.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    document.getElementById("googleLogin").onclick = async () => {
        try {
            await signInWithPopup(auth, provider);
            window.location.href = "dashboard.html";
        } catch (err) {
            console.error(err);
            alert("Login failed");
        }
    };
</script>

</body>
</html>
